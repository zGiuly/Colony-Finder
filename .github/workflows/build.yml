name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache \
            libssl-dev libgl1-mesa-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libwayland-dev \
            libxkbcommon-dev pkg-config

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: linux-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: linux-deps-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: linux-ccache-${{ github.sha }}
          restore-keys: linux-ccache-

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
             -DCMAKE_C_COMPILER_LAUNCHER=ccache
             -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --config Release -j

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ColonyFinder-linux
          path: |
            build/ColonyFinder
            build/colony_updater

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: windows-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: windows-deps-

      - name: Configure
        run: cmake -S . -B build -A x64 -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Build
        run: cmake --build build --config Release -j
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ColonyFinder-windows
          path: |
            build/Release/ColonyFinder.exe
            build/Release/colony_updater.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ColonyFinder-linux
          path: linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ColonyFinder-windows
          path: windows

      - name: Package
        run: |
          mkdir -p dist
          cp linux/ColonyFinder dist/ColonyFinder-linux-x64
          cp linux/colony_updater dist/colony_updater-linux-x64
          cp windows/ColonyFinder.exe dist/ColonyFinder-windows-x64.exe
          cp windows/colony_updater.exe dist/colony_updater-windows-x64.exe
          chmod +x dist/ColonyFinder-linux-x64 dist/colony_updater-linux-x64
          (cd dist && zip ColonyFinder-linux-x64.zip ColonyFinder-linux-x64 colony_updater-linux-x64)
          (cd dist && zip ColonyFinder-windows-x64.zip ColonyFinder-windows-x64.exe colony_updater-windows-x64.exe)

      - name: ClamAV malware scan
        uses: dell/common-github-actions/malware-scanner@main
        with:
          directories: dist
          options: -ri

      - name: VirusTotal scan
        id: vt
        continue-on-error: true
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          request_rate: 4
          files: |
            dist/ColonyFinder-linux-x64
            dist/ColonyFinder-windows-x64.exe

      - name: Build security notes
        run: |
          echo "## Installation" > vt_notes.md
          echo "" >> vt_notes.md
          echo "**Download the \`.zip\` archive for your platform** (\`ColonyFinder-windows-x64.zip\` or \`ColonyFinder-linux-x64.zip\`)." >> vt_notes.md
          echo "It contains both \`ColonyFinder\` and \`colony_updater\`, which must live in the same folder for the auto-updater to work." >> vt_notes.md
          echo "" >> vt_notes.md
          echo "The standalone binaries (\`ColonyFinder-*-x64\`, \`colony_updater-*-x64\`) are published for users who want to refresh a single component, but a fresh install should use the zip." >> vt_notes.md
          echo "" >> vt_notes.md
          echo "## Security scan" >> vt_notes.md
          echo "" >> vt_notes.md
          echo "All release binaries passed a **ClamAV** malware scan during the build." >> vt_notes.md
          echo "" >> vt_notes.md
          if [ -n "${{ steps.vt.outputs.analysis }}" ]; then
            echo "They were also analyzed by **VirusTotal** (~70 antivirus engines):" >> vt_notes.md
            echo "" >> vt_notes.md
            echo "${{ steps.vt.outputs.analysis }}" | tr ',' '\n' | while IFS='=' read -r file url; do
              echo "- [$file]($url)" >> vt_notes.md
            done
          else
            echo "The VirusTotal scan was skipped for this release (API rate limit or scan unavailable)." >> vt_notes.md
          fi
          echo "" >> vt_notes.md
          echo "> **Note:** These are self-compiled, unsigned binaries, so a few engines may report **false positives**. The source code is fully public in this repository, and you are welcome to build it yourself." >> vt_notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ColonyFinder-linux-x64
            dist/ColonyFinder-windows-x64.exe
            dist/colony_updater-linux-x64
            dist/colony_updater-windows-x64.exe
            dist/ColonyFinder-linux-x64.zip
            dist/ColonyFinder-windows-x64.zip
          body_path: vt_notes.md
          generate_release_notes: true
