name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache \
            libssl-dev libgl1-mesa-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libwayland-dev \
            libxkbcommon-dev pkg-config

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: linux-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: linux-deps-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: linux-ccache-${{ github.sha }}
          restore-keys: linux-ccache-

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
             -DCMAKE_C_COMPILER_LAUNCHER=ccache
             -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --config Release -j

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ColonyFinder-linux
          path: build/ColonyFinder

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: windows-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: windows-deps-

      - name: Configure
        run: cmake -S . -B build -A x64 -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Build
        run: cmake --build build --config Release -j
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ColonyFinder-windows
          path: build/Release/ColonyFinder.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ColonyFinder-linux
          path: linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ColonyFinder-windows
          path: windows

      - name: Package
        run: |
          mv linux/ColonyFinder ColonyFinder-linux-x64
          mv windows/ColonyFinder.exe ColonyFinder-windows-x64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ColonyFinder-linux-x64
            ColonyFinder-windows-x64.exe
          generate_release_notes: true
